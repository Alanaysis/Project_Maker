# 防火墙配置示例
# 本配置文件展示各种规则语法

# ===========================================
# 基本规则
# ===========================================

# 允许 HTTP 流量
ACCEPT tcp dst_port 80

# 允许 HTTPS 流量
ACCEPT tcp dst_port 443

# 允许 DNS 查询
ACCEPT udp dst_port 53

# ===========================================
# 带条件的规则
# ===========================================

# 允许特定 IP 的 SSH 访问
ACCEPT tcp src_ip 192.168.1.0/24 dst_port 22

# 拒绝外部 SSH 访问
DROP tcp dst_port 22

# ===========================================
# 状态检测规则
# ===========================================

# 允许已建立的连接
ACCEPT tcp ESTABLISHED

# ===========================================
# 特殊规则
# ===========================================

# 允许本地回环
ACCEPT all src_ip 127.0.0.0/8
ACCEPT all dst_ip 127.0.0.0/8

# 允许内部网络通信
ACCEPT all src_ip 192.168.0.0/16
ACCEPT all dst_ip 192.168.0.0/16

# 允许 ICMP（ping）
ACCEPT icmp all

# ===========================================
# 默认策略
# ===========================================

# 拒绝其他所有流量
DROP all all
