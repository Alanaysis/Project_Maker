# 视频理解默认配置

# 数据配置
data:
  num_frames: 16
  frame_size: [224, 224]
  sampling_method: "uniform"
  extensions: [".mp4", ".avi", ".mov", ".mkv"]

# 模型配置
model:
  backbone: "resnet18"
  pretrained: true
  feature_dim: 512
  pooling: "mean"
  num_classes: 10
  dropout: 0.3

# 摘要配置
summary:
  num_keyframes: 5
  scene_change_threshold: 0.5

# 训练配置
training:
  batch_size: 8
  learning_rate: 0.001
  epochs: 30
  weight_decay: 0.0001
  scheduler: "cosine"

# 关键帧提取配置
keyframe:
  method: "histogram"
  threshold: 0.5
  max_keyframes: 20
