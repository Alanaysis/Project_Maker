# Actor-Critic Configuration for CartPole

# Environment
env_name: "CartPole-v1"
max_steps: 500

# Network Architecture
hidden_dim: 128

# Training Hyperparameters
num_episodes: 500
actor_lr: 3e-4
critic_lr: 1e-3
gamma: 0.99
gae_lambda: 1.0
entropy_coef: 0.01
value_loss_coef: 0.5

# Logging
print_every: 10
save_path: "checkpoints/actor_critic_cartpole.pt"
