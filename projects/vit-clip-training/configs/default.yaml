# Default configuration for CLIP training

# Model configuration
model:
  name: "vit_b32"
  image_size: 224
  patch_size: 32
  embed_dim: 512
  projection_dim: 512

# Training configuration
training:
  batch_size: 32
  learning_rate: 3e-4
  weight_decay: 0.1
  max_epochs: 100
  warmup_steps: 1000
  max_grad_norm: 1.0
  use_amp: true

# Loss configuration
loss:
  type: "clip"
  temperature: 0.07

# Data configuration
data:
  image_dir: "data/images"
  captions_file: "data/captions.json"
  num_workers: 4
  pin_memory: true

# Checkpoint configuration
checkpoint:
  dir: "checkpoints"
  save_every: 1000
  log_every: 100

# Device
device: "auto"
