# YOLOv8-Tiny 配置文件
# 轻量级模型，适合快速原型验证和 CPU 推理

# 模型配置
model:
  type: yolov8_tiny
  num_classes: 80
  input_size: 640
  depth_multiple: 0.33
  width_multiple: 0.25
  reg_max: 16

# 训练配置
training:
  epochs: 300
  batch_size: 16
  num_workers: 8

  # 优化器配置
  optimizer: sgd
  lr: 0.01
  momentum: 0.937
  weight_decay: 0.0005

  # 学习率调度
  scheduler: cosine
  warmup_epochs: 3
  warmup_momentum: 0.8
  warmup_bias_lr: 0.1

  # 损失权重
  lambda_cls: 1.0
  lambda_box: 7.5
  lambda_obj: 0.5

  # 数据增强
  mosaic_prob: 1.0
  mixup_prob: 0.0
  flip_prob: 0.5

  # 早停
  patience: 100

# 数据配置
data:
  train_dir: data/train
  val_dir: data/val
  annotation_format: coco
  image_size: 640

  # 类别名称 (COCO 示例)
