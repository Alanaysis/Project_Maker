# 评估配置
evaluation:
  iou_threshold: 0.6
  conf_threshold: 0.001
  max_det: 300

# 导出配置
export:
  format: onnx
  opset_version: 11
  simplify: true
  dynamic_axes: true

# 日志配置
logging:
  level: INFO
  save_dir: runs/
  log_interval: 50
  save_period: 10
