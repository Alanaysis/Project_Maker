# 默认配置文件
# Industrial Vision Detection - Default Configuration

# 模型配置
model:
  type: yolov8_tiny
  num_classes: 5
  input_size: 640
  depth_multiple: 0.33
  width_multiple: 0.25
  reg_max: 16

# 训练配置
training:
  epochs: 100
  batch_size: 16
  num_workers: 4

  # 优化器配置
  optimizer: sgd
  lr: 0.01
  momentum: 0.937
  weight_decay: 0.0005

  # 学习率调度
  scheduler: cosine
  warmup_epochs: 3
  warmup_momentum: 0.8
  warmup_bias_lr: 0.1

  # 损失权重
  lambda_cls: 1.0
  lambda_box: 5.0
  lambda_obj: 1.0

  # 数据增强
  mosaic_prob: 1.0
  mixup_prob: 0.0
  flip_prob: 0.5

  # 早停
  patience: 20

# 数据配置
data:
  train_dir: data/train
  val_dir: data/val
  annotation_format: coco
  image_size: 640

  # 类别名称
  class_names:
    - defect_A
    - defect_B
    - defect_C
    - defect_D
    - defect_E

# 评估配置
evaluation:
  iou_threshold: 0.5
  conf_threshold: 0.25
  max_det: 300

# 导出配置
export:
  format: onnx
  opset_version: 11
  simplify: true
  dynamic_axes: true

# 日志配置
logging:
  level: INFO
  save_dir: runs/
  log_interval: 10
  save_period: 10
