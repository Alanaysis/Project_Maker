[package]
name = "mcp-server"
version = "0.1.0"
edition = "2021"
description = "A Model Context Protocol (MCP) server implementation in Rust"
authors = ["MCP Server Project"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["full"] }
thiserror = "1.0"
async-trait = "0.1"

[dev-dependencies]
tokio-test = "0.4"
