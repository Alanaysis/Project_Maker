# LoRA 微调配置
# ⭐ 重点参数说明见注释

# 模型配置
model:
  name: "gpt2"                    # 预训练模型名称
  max_length: 512                 # 最大序列长度

# LoRA 配置
lora:
  rank: 8                         # ⭐ 低秩维度 (r)
                                  # 典型值: 4, 8, 16, 32, 64
                                  # 越大表达能力越强，但参数量也越大

  alpha: 16.0                     # ⭐ 缩放因子 (α)
                                  # 实际缩放 = α / r
                                  # 控制 LoRA 更新的幅度

  dropout: 0.05                   # Dropout 概率
                                  # 防止过拟合

  target_modules:                 # 要注入 LoRA 的模块
    - "c_attn"                    # 注意力层的 Q/K/V 投影
    - "c_proj"                    # 注意力层的输出投影
    # - "c_fc"                    # MLP 层（可选）

# 训练配置
training:
  learning_rate: 2e-4             # 学习率
                                  # LoRA 通常使用较大的学习率

  num_epochs: 3                   # 训练轮数
  batch_size: 4                   # 批大小
  gradient_accumulation_steps: 1  # 梯度累积步数
  max_grad_norm: 1.0             # 梯度裁剪
  warmup_steps: 100              # 预热步数
  weight_decay: 0.01             # 权重衰减

# 数据配置
data:
  train_file: "data/train.jsonl"  # 训练数据路径
  eval_file: "data/eval.jsonl"    # 评估数据路径
  format_template: "alpaca"       # 数据格式模板

# 输出配置
output:
  dir: "./lora_output"            # 输出目录
  logging_steps: 10               # 日志间隔
  eval_steps: 100                 # 评估间隔
  save_steps: 500                 # 保存间隔
