[package]
name = "vpn-software"
version = "0.1.0"
edition = "2021"
authors = ["VPN Software Project"]
description = "A VPN software implementation with tunnel encryption and traffic forwarding"
license = "MIT"

[dependencies]
# TUN device management
tun = "0.6"
# Cryptography
ring = "0.17"
x25519-dalek = { version = "2.0", features = ["static_secrets"] }
chacha20poly1305 = "0.10"
blake2 = "0.10"
hkdf = "0.12"
sha2 = "0.10"
rand = "0.8"
# Async runtime
tokio = { version = "1", features = ["full"] }
# Network
socket2 = "0.5"
bytes = "1"
# Error handling
anyhow = "1"
thiserror = "1"
# Logging
tracing = "0.1"
tracing-subscriber = "0.3"
# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# Configuration
toml = "0.8"
# CLI
clap = { version = "4", features = ["derive"] }

[dev-dependencies]
tempfile = "3"
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "crypto_bench"
harness = false

[[example]]
name = "simple_vpn"
path = "examples/simple_vpn.rs"

[[example]]
name = "tun_demo"
path = "examples/tun_demo.rs"
