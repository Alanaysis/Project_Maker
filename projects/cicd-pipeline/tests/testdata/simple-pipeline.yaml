name: simple-test
stages:
  - name: build
    tasks:
      - name: compile
        command: echo "Compiling project..."
  - name: test
    depends_on:
      - build
    tasks:
      - name: unit-test
        command: echo "Running unit tests..."
  - name: deploy
    depends_on:
      - test
    tasks:
      - name: deploy-task
        command: echo "Deploying application..."
