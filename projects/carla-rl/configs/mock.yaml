# Mock Environment Configuration (for testing without CARLA)

# Environment settings
env:
  target_speed: 30.0  # km/h
  max_steps: 500
  road_width: 8.0
  use_camera: false
  image_size: [84, 84]

# Reward weights
reward:
  progress: 1.0
  speed: 0.5
  lane: 0.3
  heading: 0.2
  collision: -100.0
  time: -0.01
  comfort: 0.1

# PPO hyperparameters
ppo:
  policy: "MlpPolicy"
  learning_rate: 0.0003
  n_steps: 512
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  n_envs: 1
  device: "auto"

# Training settings (shorter for testing)
training:
  total_timesteps: 50000
  eval_freq: 5000
  n_eval_episodes: 5
  save_freq: 10000
  save_path: "./checkpoints/mock/"
  tensorboard_log: "./tb_logs/mock/"

# Logging
logging:
  verbose: 1
  log_dir: "./logs/mock/"
