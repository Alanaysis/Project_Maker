# SLAM System Configuration

# Camera parameters
camera:
  fx: 525.0
  fy: 525.0
  cx: 319.5
  cy: 239.5
  width: 640
  height: 480
  depth_scale: 1000.0

# Feature extraction parameters
features:
  n_features: 1000
  scale_factor: 1.2
  n_levels: 8
  edge_threshold: 31
  fast_threshold: 20
  match_ratio_threshold: 0.75
  min_matches: 10

# SLAM system parameters
slam:
  keyframe_interval: 5
  max_keyframes: 1000
  min_translation: 0.1
  min_rotation: 0.1

# Loop closure parameters
loop_closure:
  enabled: true
  interval: 20
  min_candidates: 3
  similarity_threshold: 0.7

# Map parameters
map:
  voxel_size: 0.05
  max_depth: 5.0
  min_depth: 0.1
