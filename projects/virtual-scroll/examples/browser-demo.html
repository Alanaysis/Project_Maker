<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virtual Scroll Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 800px;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }

    .header h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .header p {
      opacity: 0.9;
      font-size: 14px;
    }

    .controls {
      padding: 20px 30px;
      background: #f8f9fa;
      border-bottom: 1px solid #e9ecef;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      align-items: center;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .control-group label {
      font-size: 14px;
      color: #495057;
      font-weight: 500;
    }

    input[type="number"] {
      width: 120px;
      padding: 8px 12px;
      border: 1px solid #ced4da;
      border-radius: 6px;
      font-size: 14px;
    }

    button {
      padding: 8px 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    .stats {
      padding: 15px 30px;
      background: #e9ecef;
      display: flex;
      justify-content: space-around;
      font-size: 13px;
      color: #495057;
    }

    .stat-item {
      text-align: center;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 700;
      color: #667eea;
    }

    .scroll-container {
      height: 500px;
      overflow-y: auto;
      position: relative;
    }

    .scroll-content {
      position: relative;
      width: 100%;
    }

    .list-item {
      position: absolute;
      left: 0;
      width: 100%;
      padding: 15px 30px;
      border-bottom: 1px solid #e9ecef;
      transition: background-color 0.2s;
      cursor: pointer;
    }

    .list-item:hover {
      background-color: #f8f9fa;
    }

    .list-item .index {
      display: inline-block;
      width: 60px;
      font-weight: 700;
      color: #667eea;
    }

    .list-item .title {
      font-weight: 500;
      color: #212529;
    }

    .list-item .description {
      margin-top: 5px;
      font-size: 13px;
      color: #6c757d;
    }

    .footer {
      padding: 20px 30px;
      background: #f8f9fa;
      border-top: 1px solid #e9ecef;
      text-align: center;
      font-size: 12px;
      color: #6c757d;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Virtual Scroll Demo</h1>
      <p>High-performance virtual scrolling for million-level lists</p>
    </div>

    <div class="controls">
      <div class="control-group">
        <label>Total Items:</label>
        <input type="number" id="itemCount" value="1000000" min="1000" max="10000000">
      </div>
      <button onclick="loadItems()">Load Items</button>
      <button onclick="scrollToRandom()">Random Scroll</button>
      <button onclick="scrollToMiddle()">Scroll to Middle</button>
    </div>

    <div class="stats">
      <div class="stat-item">
        <div class="stat-value" id="totalItems">1,000,000</div>
        <div>Total Items</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="renderedItems">0</div>
        <div>Rendered</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="scrollPosition">0</div>
        <div>Position</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="fps">60</div>
        <div>FPS</div>
      </div>
    </div>

    <div class="scroll-container" id="scrollContainer">
      <div class="scroll-content" id="scrollContent"></div>
    </div>

    <div class="footer">
      Virtual Scroll Component - Performance Demo
    </div>
  </div>

  <script>
    // 虚拟滚动实现（简化版，用于演示）
    class VirtualScroll {
      constructor(options) {
        this.containerHeight = options.containerHeight || 500;
        this.itemHeight = options.itemHeight || 50;
        this.bufferCount = options.bufferCount || 10;
        this.items = [];
        this.renderedItems = new Map();
        this.scrollTop = 0;
      }

      setDataSource(items) {
        this.items = items;
        this.update();
      }

      handleScroll(scrollTop) {
        this.scrollTop = scrollTop;
        this.update();
      }

      update() {
        const startIndex = Math.floor(this.scrollTop / this.itemHeight);
        const endIndex = Math.min(
          this.items.length - 1,
          startIndex + Math.ceil(this.containerHeight / this.itemHeight) + this.bufferCount
        );

        const bufferedStart = Math.max(0, startIndex - this.bufferCount);

        return {
          startIndex: bufferedStart,
          endIndex: endIndex,
          offsetY: bufferedStart * this.itemHeight
        };
      }

      getTotalHeight() {
        return this.items.length * this.itemHeight;
      }

      getVisibleRange() {
        return this.update();
      }

      scrollToIndex(index) {
        return index * this.itemHeight;
      }
    }

    // 应用状态
    let virtualScroll;
    let items = [];
    let frameCount = 0;
    let lastFpsTime = Date.now();

    // 初始化
    function init() {
      const container = document.getElementById('scrollContainer');
      const content = document.getElementById('scrollContent');

      virtualScroll = new VirtualScroll({
        containerHeight: container.clientHeight,
        itemHeight: 60,
        bufferCount: 10
      });

      container.addEventListener('scroll', () => {
        requestAnimationFrame(() => {
          const scrollTop = container.scrollTop;
          virtualScroll.handleScroll(scrollTop);
          renderVisibleItems();
          updateStats();
        });
      });

      loadItems();
    }

    // 加载项目
    function loadItems() {
      const count = parseInt(document.getElementById('itemCount').value) || 1000000;
      const content = document.getElementById('scrollContent');

      items = Array.from({ length: count }, (_, i) => ({
        id: i,
        title: `Item ${i + 1}`,
        description: `This is a virtual scroll item with index ${i}`
      }));

      virtualScroll.setDataSource(items);
      content.style.height = `${virtualScroll.getTotalHeight()}px`;

      document.getElementById('totalItems').textContent = count.toLocaleString();
      renderVisibleItems();
    }

    // 渲染可见项目
    function renderVisibleItems() {
      const content = document.getElementById('scrollContent');
      const range = virtualScroll.getVisibleRange();
      const rendered = new Set();

      // 渲染新项目
      for (let i = range.startIndex; i <= range.endIndex; i++) {
        rendered.add(i);

        if (!virtualScroll.renderedItems.has(i)) {
          const item = items[i];
          if (!item) continue;

          const element = document.createElement('div');
          element.className = 'list-item';
          element.style.top = `${i * 60}px`;
          element.style.height = '60px';
          element.innerHTML = `
            <span class="index">#${item.id + 1}</span>
            <span class="title">${item.title}</span>
            <div class="description">${item.description}</div>
          `;

          content.appendChild(element);
          virtualScroll.renderedItems.set(i, element);
        }
      }

      // 移除不可见项目
      for (const [index, element] of virtualScroll.renderedItems) {
        if (!rendered.has(index)) {
          element.remove();
          virtualScroll.renderedItems.delete(index);
        }
      }

      document.getElementById('renderedItems').textContent = rendered.size;
    }

    // 更新统计
    function updateStats() {
      const container = document.getElementById('scrollContainer');
      document.getElementById('scrollPosition').textContent =
        Math.floor(container.scrollTop / 60).toLocaleString();

      // FPS 计算
      frameCount++;
      const now = Date.now();
      if (now - lastFpsTime >= 1000) {
        document.getElementById('fps').textContent = frameCount;
        frameCount = 0;
        lastFpsTime = now;
      }
    }

    // 随机滚动
    function scrollToRandom() {
      const container = document.getElementById('scrollContainer');
      const maxScroll = container.scrollHeight - container.clientHeight;
      container.scrollTop = Math.random() * maxScroll;
    }

    // 滚动到中间
    function scrollToMiddle() {
      const container = document.getElementById('scrollContainer');
      container.scrollTop = (container.scrollHeight - container.clientHeight) / 2;
    }

    // 页面加载后初始化
    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
