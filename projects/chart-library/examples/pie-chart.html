<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>饼图示例</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      color: #333;
      margin-bottom: 20px;
    }
    #chart {
      width: 100%;
    }
    .controls {
      margin-top: 20px;
    }
    button {
      padding: 8px 16px;
      margin-right: 10px;
      background: #4e79a7;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background: #3d6290;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>饼图示例</h1>
    <div id="chart"></div>
    <div class="controls">
      <button onclick="updateData()">更新数据</button>
    </div>
  </div>

  <script type="module">
    // 模拟导入
    const COLORS = [
      '#4e79a7', '#f28e2b', '#e15759', '#76b7b2',
      '#59a14f', '#edc948', '#b07aa1', '#ff9da7',
    ];

    class PieChart {
      constructor(container, data, options = {}) {
        this.container = typeof container === 'string'
          ? document.querySelector(container)
          : container;
        this.data = data;
        this.options = {
          width: options.width || 500,
          height: options.height || 400,
          padding: options.padding || { top: 40, right: 40, bottom: 60, left: 40 },
          backgroundColor: options.backgroundColor || '#ffffff',
        };

        this.canvas = document.createElement('canvas');
        this.setupCanvas();
        this.container.appendChild(this.canvas);
        this.ctx = this.canvas.getContext('2d');

        this.highlightedSlice = null;
        this.slices = [];
        this.setupInteraction();

        this.render();
      }

      setupCanvas() {
        const dpr = window.devicePixelRatio || 1;
        this.canvas.width = this.options.width * dpr;
        this.canvas.height = this.options.height * dpr;
        this.canvas.style.width = `${this.options.width}px`;
        this.canvas.style.height = `${this.options.height}px`;
        this.ctx.scale(dpr, dpr);
      }

      setupInteraction() {
        this.canvas.addEventListener('mousemove', (e) => {
          const rect = this.canvas.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;

          const slice = this.findSliceAt(x, y);
          if (slice) {
            this.highlightedSlice = slice;
            this.showTooltip(x, y, `${slice.label}: ${slice.value} (${slice.percentage.toFixed(1)}%)`);
          } else {
            this.highlightedSlice = null;
            this.hideTooltip();
          }
          this.render();
        });

        this.canvas.addEventListener('mouseleave', () => {
          this.highlightedSlice = null;
          this.hideTooltip();
          this.render();
        });
      }

      findSliceAt(x, y) {
        const dist = this.distance(x, y, this.centerX, this.centerY);
        if (dist > this.radius) return null;

        const angle = Math.atan2(y - this.centerY, x - this.centerX);
        let normalizedAngle = angle;
        if (normalizedAngle < -Math.PI / 2) {
          normalizedAngle += Math.PI * 2;
        }

        for (const slice of this.slices) {
          if (normalizedAngle >= slice.startAngle && normalizedAngle <= slice.endAngle) {
            return slice;
          }
        }
        return null;
      }

      distance(x1, y1, x2, y2) {
        return Math.sqrt(Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2));
      }

      showTooltip(x, y, content) {
        if (!this.tooltip) {
          this.tooltip = document.createElement('div');
          this.tooltip.style.cssText = `
            position: absolute;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 12px;
            pointer-events: none;
            z-index: 1000;
          `;
          this.container.style.position = 'relative';
          this.container.appendChild(this.tooltip);
        }
        this.tooltip.textContent = content;
        this.tooltip.style.left = `${x + 10}px`;
        this.tooltip.style.top = `${y - 30}px`;
        this.tooltip.style.display = 'block';
      }

      hideTooltip() {
        if (this.tooltip) {
          this.tooltip.style.display = 'none';
        }
      }

      render() {
        this.ctx.fillStyle = this.options.backgroundColor;
        this.ctx.fillRect(0, 0, this.options.width, this.options.height);

        // 绘制标题
        if (this.data.title) {
          this.ctx.fillStyle = '#333';
          this.ctx.font = 'bold 16px sans-serif';
          this.ctx.textAlign = 'center';
          this.ctx.fillText(this.data.title, this.options.width / 2, 25);
        }

        this.calculateGeometry();
        this.drawPie();
        this.drawLabels();
        this.drawLegend();
      }

      calculateGeometry() {
        const { width, height, padding } = this.options;
        this.centerX = width / 2;
        this.centerY = (height - padding.bottom) / 2 + padding.top / 2;
        this.radius = Math.min(
          width - padding.left - padding.right,
          height - padding.top - padding.bottom
        ) / 2 - 20;
      }

      drawPie() {
        const values = this.data.datasets[0].data;
        const total = values.reduce((sum, val) => sum + val, 0);
        if (total === 0) return;

        this.slices = [];
        let startAngle = -Math.PI / 2;

        values.forEach((value, index) => {
          const sliceAngle = (value / total) * Math.PI * 2;
          const color = this.data.datasets[0].colors?.[index] || COLORS[index % COLORS.length];
          const percentage = (value / total) * 100;

          const isHighlighted = this.highlightedSlice?.index === index;

          this.ctx.beginPath();
          if (isHighlighted) {
            const midAngle = startAngle + sliceAngle / 2;
            const offsetX = Math.cos(midAngle) * 10;
            const offsetY = Math.sin(midAngle) * 10;
            this.ctx.moveTo(this.centerX + offsetX, this.centerY + offsetY);
            this.ctx.arc(
              this.centerX + offsetX,
              this.centerY + offsetY,
              this.radius,
              startAngle,
              startAngle + sliceAngle
            );
          } else {
            this.ctx.moveTo(this.centerX, this.centerY);
            this.ctx.arc(this.centerX, this.centerY, this.radius, startAngle, startAngle + sliceAngle);
          }
          this.ctx.closePath();

          this.ctx.fillStyle = isHighlighted ? this.lightenColor(color, 20) : color;
          this.ctx.fill();

          this.ctx.strokeStyle = '#ffffff';
          this.ctx.lineWidth = 2;
          this.ctx.stroke();

          this.slices.push({
            startAngle,
            endAngle: startAngle + sliceAngle,
            value,
            percentage,
            label: this.data.labels[index],
            color,
            index,
          });

          startAngle += sliceAngle;
        });
      }

      drawLabels() {
        this.slices.forEach(slice => {
          if (slice.percentage < 5) return;

          const midAngle = (slice.startAngle + slice.endAngle) / 2;
          const labelRadius = this.radius * 0.7;
          const x = this.centerX + Math.cos(midAngle) * labelRadius;
          const y = this.centerY + Math.sin(midAngle) * labelRadius;

          this.ctx.fillStyle = '#ffffff';
          this.ctx.font = 'bold 12px sans-serif';
          this.ctx.textAlign = 'center';
          this.ctx.textBaseline = 'middle';
          this.ctx.fillText(`${slice.percentage.toFixed(1)}%`, x, y);
        });
      }

      drawLegend() {
        const legendY = this.options.height - 15;
        let legendX = 20;

        this.data.labels.forEach((label, index) => {
          const color = this.data.datasets[0].colors?.[index] || COLORS[index % COLORS.length];
          this.ctx.fillStyle = color;
          this.ctx.fillRect(legendX, legendY - 5, 12, 12);
          this.ctx.fillStyle = '#666';
          this.ctx.font = '11px sans-serif';
          this.ctx.textAlign = 'left';
          this.ctx.fillText(label, legendX + 16, legendY + 1);
          legendX += this.ctx.measureText(label).width + 30;
        });
      }

      lightenColor(hex, amount) {
        const r = Math.min(255, parseInt(hex.slice(1, 3), 16) + amount);
        const g = Math.min(255, parseInt(hex.slice(3, 5), 16) + amount);
        const b = Math.min(255, parseInt(hex.slice(5, 7), 16) + amount);
        return `rgb(${r}, ${g}, ${b})`;
      }

      update(data) {
        this.data = data;
        this.render();
      }
    }

    // 使用示例
    const data = {
      title: '市场份额分布',
      labels: ['Chrome', 'Safari', 'Firefox', 'Edge', '其他'],
      datasets: [
        {
          label: '浏览器',
          data: [65, 18, 8, 5, 4],
          colors: ['#4e79a7', '#f28e2b', '#e15759', '#76b7b2', '#59a14f'],
        },
      ],
    };

    const chart = new PieChart('#chart', data, {
      width: 500,
      height: 400,
    });

    window.updateData = function() {
      const newValues = [65, 18, 8, 5, 4].map(() => Math.floor(Math.random() * 60) + 5);
      const total = newValues.reduce((a, b) => a + b, 0);
      const normalizedValues = newValues.map(v => Math.round(v / total * 100));

      const newData = {
        ...data,
        datasets: [{
          ...data.datasets[0],
          data: normalizedValues,
        }],
      };
      chart.update(newData);
    };
  </script>
</body>
</html>
