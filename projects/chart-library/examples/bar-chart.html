<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>柱状图示例</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      color: #333;
      margin-bottom: 20px;
    }
    #chart {
      width: 100%;
    }
    .controls {
      margin-top: 20px;
    }
    button {
      padding: 8px 16px;
      margin-right: 10px;
      background: #4e79a7;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background: #3d6290;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>柱状图示例</h1>
    <div id="chart"></div>
    <div class="controls">
      <button onclick="updateData()">更新数据</button>
    </div>
  </div>

  <script type="module">
    // 模拟导入
    class LinearScale {
      constructor(domain, range) {
        this.domain = domain;
        this.range = range;
      }
      scale(value) {
        const [d0, d1] = this.domain;
        const [r0, r1] = this.range;
        return r0 + ((value - d0) / (d1 - d0)) * (r1 - r0);
      }
    }

    class CategoryScale {
      constructor(domain, range) {
        this.domain = domain;
        this.range = range;
      }
      scale(index) {
        const [r0, r1] = this.range;
        const step = (r1 - r0) / this.domain.length;
        return r0 + step * (index + 0.5);
      }
      getBandwidth() {
        const [r0, r1] = this.range;
        return (r1 - r0) / this.domain.length;
      }
    }

    class BarChart {
      constructor(container, data, options = {}) {
        this.container = typeof container === 'string'
          ? document.querySelector(container)
          : container;
        this.data = data;
        this.options = {
          width: options.width || 700,
          height: options.height || 400,
          padding: options.padding || { top: 40, right: 40, bottom: 60, left: 60 },
          backgroundColor: options.backgroundColor || '#ffffff',
        };

        this.canvas = document.createElement('canvas');
        this.setupCanvas();
        this.container.appendChild(this.canvas);
        this.ctx = this.canvas.getContext('2d');

        this.highlightedBar = null;
        this.bars = [];
        this.setupInteraction();

        this.render();
      }

      setupCanvas() {
        const dpr = window.devicePixelRatio || 1;
        this.canvas.width = this.options.width * dpr;
        this.canvas.height = this.options.height * dpr;
        this.canvas.style.width = `${this.options.width}px`;
        this.canvas.style.height = `${this.options.height}px`;
        this.ctx.scale(dpr, dpr);
      }

      setupInteraction() {
        this.canvas.addEventListener('mousemove', (e) => {
          const rect = this.canvas.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;

          const bar = this.findBarAt(x, y);
          if (bar) {
            this.highlightedBar = bar;
            this.showTooltip(x, y, `${bar.label}: ${bar.value}`);
          } else {
            this.highlightedBar = null;
            this.hideTooltip();
          }
          this.render();
        });

        this.canvas.addEventListener('mouseleave', () => {
          this.highlightedBar = null;
          this.hideTooltip();
          this.render();
        });
      }

      findBarAt(x, y) {
        for (const bar of this.bars) {
          if (x >= bar.x && x <= bar.x + bar.width &&
              y >= bar.y && y <= bar.y + bar.height) {
            return bar;
          }
        }
        return null;
      }

      showTooltip(x, y, content) {
        if (!this.tooltip) {
          this.tooltip = document.createElement('div');
          this.tooltip.style.cssText = `
            position: absolute;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 12px;
            pointer-events: none;
            z-index: 1000;
          `;
          this.container.style.position = 'relative';
          this.container.appendChild(this.tooltip);
        }
        this.tooltip.textContent = content;
        this.tooltip.style.left = `${x + 10}px`;
        this.tooltip.style.top = `${y - 30}px`;
        this.tooltip.style.display = 'block';
      }

      hideTooltip() {
        if (this.tooltip) {
          this.tooltip.style.display = 'none';
        }
      }

      render() {
        this.ctx.fillStyle = this.options.backgroundColor;
        this.ctx.fillRect(0, 0, this.options.width, this.options.height);

        const plot = {
          x: this.options.padding.left,
          y: this.options.padding.top,
          width: this.options.width - this.options.padding.left - this.options.padding.right,
          height: this.options.height - this.options.padding.top - this.options.padding.bottom,
        };

        const allValues = this.data.datasets.flatMap(ds => ds.data);
        const max = Math.max(...allValues);
        const yPadding = max * 0.1;

        this.xScale = new CategoryScale(this.data.labels, [plot.x, plot.x + plot.width]);
        this.yScale = new LinearScale([0, max + yPadding], [plot.y + plot.height, plot.y]);

        this.drawGrid(plot);
        this.drawAxes(plot);
        this.drawBars();
        this.drawLegend();
      }

      drawGrid(plot) {
        const ticks = this.getYTicks(5);
        ticks.forEach(tick => {
          const y = this.yScale.scale(tick);
          this.ctx.beginPath();
          this.ctx.strokeStyle = '#e0e0e0';
          this.ctx.lineWidth = 0.5;
          this.ctx.moveTo(plot.x, y);
          this.ctx.lineTo(plot.x + plot.width, y);
          this.ctx.stroke();

          this.ctx.fillStyle = '#666';
          this.ctx.font = '11px sans-serif';
          this.ctx.textAlign = 'right';
          this.ctx.fillText(tick.toString(), plot.x - 10, y + 4);
        });
      }

      drawAxes(plot) {
        this.ctx.beginPath();
        this.ctx.strokeStyle = '#333';
        this.ctx.lineWidth = 1;
        this.ctx.moveTo(plot.x, plot.y + plot.height);
        this.ctx.lineTo(plot.x + plot.width, plot.y + plot.height);
        this.ctx.stroke();

        this.ctx.beginPath();
        this.ctx.moveTo(plot.x, plot.y);
        this.ctx.lineTo(plot.x, plot.y + plot.height);
        this.ctx.stroke();

        this.data.labels.forEach((label, index) => {
          const x = this.xScale.scale(index);
          this.ctx.fillStyle = '#666';
          this.ctx.font = '11px sans-serif';
          this.ctx.textAlign = 'center';
          this.ctx.fillText(label, x, plot.y + plot.height + 20);
        });
      }

      drawBars() {
        this.bars = [];
        const datasetCount = this.data.datasets.length;
        const barGroupWidth = this.xScale.getBandwidth() * 0.8;
        const barWidth = barGroupWidth / datasetCount;
        const groupOffset = (this.xScale.getBandwidth() - barGroupWidth) / 2;

        this.data.datasets.forEach((dataset, datasetIndex) => {
          const color = dataset.color || this.getDefaultColor(datasetIndex);

          dataset.data.forEach((value, index) => {
            const x = this.xScale.scale(index) - barGroupWidth / 2 + groupOffset + datasetIndex * barWidth;
            const y = this.yScale.scale(value);
            const baseY = this.yScale.scale(0);
            const height = baseY - y;

            const isHighlighted = this.highlightedBar &&
              this.highlightedBar.datasetIndex === datasetIndex &&
              this.highlightedBar.dataIndex === index;

            this.ctx.fillStyle = isHighlighted ? this.darkenColor(color, 30) : color;

            // 圆角矩形
            const radius = 3;
            this.ctx.beginPath();
            this.ctx.moveTo(x + radius, y);
            this.ctx.lineTo(x + barWidth - 2 - radius, y);
            this.ctx.quadraticCurveTo(x + barWidth - 2, y, x + barWidth - 2, y + radius);
            this.ctx.lineTo(x + barWidth - 2, baseY);
            this.ctx.lineTo(x, baseY);
            this.ctx.lineTo(x, y + radius);
            this.ctx.quadraticCurveTo(x, y, x + radius, y);
            this.ctx.closePath();
            this.ctx.fill();

            this.bars.push({
              x, y, width: barWidth - 2, height,
              value,
              label: this.data.labels[index],
              datasetIndex,
              dataIndex: index,
            });
          });
        });
      }

      drawLegend() {
        if (this.data.datasets.length <= 1) return;

        const legendY = this.options.height - 15;
        let legendX = this.options.width / 2 - (this.data.datasets.length * 80) / 2;

        this.data.datasets.forEach((dataset, index) => {
          const color = dataset.color || this.getDefaultColor(index);
          this.ctx.fillStyle = color;
          this.ctx.fillRect(legendX, legendY - 5, 12, 12);
          this.ctx.fillStyle = '#666';
          this.ctx.font = '11px sans-serif';
          this.ctx.textAlign = 'left';
          this.ctx.fillText(dataset.label, legendX + 16, legendY + 1);
          legendX += 80;
        });
      }

      getYTicks(count) {
        const [min, max] = this.yScale.domain;
        const range = max - min;
        const step = range / count;
        const ticks = [];
        for (let i = 0; i <= count; i++) {
          ticks.push(Math.round((min + step * i) * 10) / 10);
        }
        return ticks;
      }

      getDefaultColor(index) {
        const colors = ['#4e79a7', '#f28e2b', '#e15759', '#76b7b2', '#59a14f'];
        return colors[index % colors.length];
      }

      darkenColor(hex, amount) {
        const r = Math.max(0, parseInt(hex.slice(1, 3), 16) - amount);
        const g = Math.max(0, parseInt(hex.slice(3, 5), 16) - amount);
        const b = Math.max(0, parseInt(hex.slice(5, 7), 16) - amount);
        return `rgb(${r}, ${g}, ${b})`;
      }

      update(data) {
        this.data = data;
        this.render();
      }
    }

    // 使用示例
    const data = {
      labels: ['北京', '上海', '广州', '深圳', '杭州'],
      datasets: [
        {
          label: '2023年',
          data: [1200, 1500, 900, 1100, 800],
          color: '#4e79a7',
        },
        {
          label: '2024年',
          data: [1400, 1600, 1000, 1300, 950],
          color: '#f28e2b',
        },
      ],
    };

    const chart = new BarChart('#chart', data, {
      width: 700,
      height: 400,
    });

    window.updateData = function() {
      const newData = {
        ...data,
        datasets: data.datasets.map(ds => ({
          ...ds,
          data: ds.data.map(() => Math.floor(Math.random() * 1500) + 500),
        })),
      };
      chart.update(newData);
    };
  </script>
</body>
</html>
